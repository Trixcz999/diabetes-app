<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Prediction</title>
    <style>
        body {
            font-family: Arial;
            max-width: 500px;
            margin: auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h2 {
            color: #2c3e50;
            text-align: center;
        }
        label {
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 15px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            background-color: #27ae60;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <h2>Diabetes Risk Prediction</h2>
    <form action="/predict" method="POST">
        <label>Number of Pregnancies:</label>
        <input type="number" name="pregnancies" required>

        <label>Glucose Level:</label>
        <input type="number" name="glucose" required>

        <label>Blood Pressure:</label>
        <input type="number" name="bloodpressure" required>

        <label>Skin Thickness:</label>
        <input type="number" name="skinthickness" required>

        <label>Insulin Level:</label>
        <input type="number" name="insulin" required>

        <label>BMI:</label>
        <input type="number" step="0.1" name="bmi" required>

        <label>Diabetes Pedigree Function:</label>
        <input type="number" step="0.001" name="dpf" required>

        <label>Age:</label>
        <input type="number" name="age" required>

        <button type="submit">Predict</button>
    </form>
</body>
</html>
